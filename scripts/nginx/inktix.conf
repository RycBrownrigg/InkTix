# Nginx config for InkTix
# Serves both inktix.com and inktix.rycsprojects.com
# Install: sudo cp this-file /etc/nginx/sites-available/inktix
#          sudo ln -s /etc/nginx/sites-available/inktix /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#          sudo certbot --nginx -d inktix.com -d inktix.rycsprojects.com

server {
    listen 80;
    # listen 443 ssl;  # Certbot will add this

    server_name inktix.rycsprojects.com;

    root /var/www/projects/inktix/public;
    index index.html;

    # Next.js static export with trailingSlash
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
